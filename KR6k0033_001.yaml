body:
  text: 大唐三藏法師義淨奉制譯大門總攝頌曰初明受近圓次分亡人物圓壇并戶鉤菩薩像五門別門初總攝頌曰近圓知日數界別不入地界邊五衆居不截皮生肉第一子攝頌曰近圓男女狀非近圓為師難等十無師莫授我七歲爾時薄伽梵在室羅伐城逝多林給孤獨園具壽塢波離來詣佛所禮雙足已在一面坐合掌恭敬白佛言世尊若苾芻與他受近圓時彼若根轉得名善受不佛言是受近圓應可移向苾芻尼處復次世尊若苾芻與他男子受近圓時而此男子作女人音聲女人意樂及形狀法式此人得名為受近圓不佛言塢波離是受近圓諸苾芻得越法罪若苾芻尼與他女人受近圓時而此女人作男子音聲男子意樂及形狀法式此人得名受近圓不佛言是受近圓諸苾芻尼得越法罪若以不受近圓人為親教師此人得名受近圓不佛言是受近圓諸苾芻得越法罪若人身有難事自言我有諸苾芻為受近圓此人得名受近圓不佛言不名受近圓諸苾芻得越法罪若人身無難事自言我有諸苾芻為受近圓此人得名受近圓不佛言是受近圓諸苾芻得越法罪若人實有難事自言我無諸難苾芻為受近圓此人得名受近圓不佛言不名受近圓諸苾芻無犯若人實無難事復自言無諸苾芻為受近圓此人得名受近圓不佛言此名善受若苾芻與出家者未受十戒而受近圓此人得名受近圓不佛言是受諸苾芻得越法罪若人受近圓時親教師不現前諸苾芻為受近圓此人得名受近圓不佛言是受近圓諸苾芻得越法罪若人受近圓時作如是語莫授我近圓諸苾芻為受此人得名受近圓不佛言非受近圓諸苾芻得越法罪如世尊説若人年滿七歲能驅烏鳥應與出家者大德若有童子年始六歲於僧食厨能驅烏鳥此人應與出家不佛言許滿七歲此不應與若滿七歲不能驅烏與出家不佛言不應許能驅烏故第二子攝頌曰日數每應知告白夜須減六日十八日説戒不應頻爾時佛在室羅伐城有婆羅門居士等至苾芻所問言阿離耶今是何日答言不知諸人告曰聖者外道之類於諸日數及以星曆悉皆善識仁等亦應知日數星曆云何不解而為出家遂默不答諸苾芻以緣白佛佛言我今聽諸苾芻知日數星曆時諸苾芻悉皆學數星曆及以算法便生擾亂廢修善業佛言應令一人學數雖聞佛教不知誰當合數佛言應令衆首上座數之是時上座忘失其數使知事人亦不能憶佛言可作泥珠或作竹籌滿十五枚每日移一如此作時被風吹亂佛言應取十五枚竹片可長四五指一頭穿孔以繩貫之挂壁要處每日移一時彼舉衆皆共移籌佛言上座及知事者應移時有婆羅門居士至苾芻所問言聖者今是何日彼便報曰仁今可問上座及知事人諸人告曰仁等亦有計番當直知日人耶時諸苾芻默然無答以緣白佛佛言應可作白普告衆人時諸苾芻隨處告白佛言不應隨處作白然於衆集在上座前而為秉白大衆應知今是月一日諸俗聞説復云仁等豈可不説半月黑白分耶答言不作苾芻白佛佛言當稱黑白月分應如是説若於晡後大衆集時令一苾芻於上座前合掌而立一心恭敬作如是白大德僧伽聽今是黑月一日仁等應為造寺施主及護寺天神并舊住天神各誦經中清淨妙頌時諸苾芻雖復日日告白不稱造寺施主名字佛言當稱造寺施主名字亦應稱説明日設食施主名字令彼施主所願隨意福善彌增若更有餘施主皆同此説及餘天衆八部之類師僧父母皆悉稱名普及一切衆生皆令福利增長時諸苾芻聞是語已即皆各説清淨伽他曰所為布施者必獲其義利若為樂故施後必得安樂菩薩之福報無盡若虛空施獲如是果增長無休息時有施主請諸苾芻當設供養苾芻知已不為宣告施主名及以住處佛言應預宣告施主名字云施主某甲明日當為大衆設食住在某處復有婆羅門居士至苾芻處問言聖者今是何日答言是十五日彼復問曰時人皆云十四日如何仁等言十五耶豈可苾芻不為減夜答言不作時諸苾芻以緣白佛佛言應為減夜時諸苾芻頻於半月而為減夜俗人問言聖者今是何日答是十四彼言聖者時人皆云十五日如何仁等頻於半月而為減夜時諸苾芻以緣白佛佛言汝等不應頻於半月而減其夜然須計時過月半已應為減夜謂從正月十六日至二月十五日為一月從二月十六日至月盡即是月半令減一夜為其小月餘皆倣此為東西不同故如是一歲總有六日是十四日有六日是十五日為長淨事時有婆羅門居士來問苾芻曰聖者今是何月答言今是室羅末拏月當五月十六日已去至六月十五日彼復問言聖者諸人咸云阿沙荼月從四月十六日至五月十五日仁等乃云室羅末拏月豈可仁等不為閏月耶答言不為人皆共笑時諸苾芻以緣白佛佛言應為閏月時諸苾芻於每年中恆為閏月俗人來問聖者今是何月答言是阿沙荼月彼復問言聖者諸人咸云今是室羅末拏月仁等乃云是阿沙荼月豈可仁等於每年中為閏月耶答言如是同前譏笑苾芻以緣白佛佛言不應於年年中而作閏月應至六歲方為閏月即是五六當三十月此謂古法與今不同時有國王至二年半便為一閏苾芻不隨人共嫌恥佛言苾芻應隨王法為其閏月若星道行參差者亦應隨其星道而數用之是故汝等應可識知日月星分與俗同行令諸外道來求過者不得其便大德頗有苾芻住處令授學人得説戒不佛言不得第三子攝頌曰界別不告淨亦不為羯磨乘空不持欲解前方結後爾時佛在室羅伐城具壽塢波離請世尊曰住界內人得向界外者告清淨不佛言不得住界外人得向界內者告清淨不佛言不得住界內人得為界外者作羯磨不佛言不得住界外人得為界內者作羯磨不佛言不得若有乘空持欲去時成持欲不佛言不成應更取欲若不解前界得結後界不佛言不得應以白四解前然後方結第四子攝頌曰不入界捨界樹界有世尊不越及可越羯磨者身死具壽塢波離請世尊曰頗得以界入餘界不佛言不得有幾種界不相涉入佛言謂小壇場及現停水處并苾芻苾芻尼界此皆不入若先結界有幾種捨法佛言有五一謂大衆悉皆歸俗二謂大衆同時轉根三謂大衆決心捨去四謂大衆俱時命過五謂秉白四羯磨解得以一樹為二界標不佛言各取一邊得為三界標或為四界標量知分齊皆得成就爾時世尊在迦尸國人間遊行遇到一處遂便微笑世尊常法若微笑時即於口中出五種色青黃赤白及以紅光或時下照或復上升其光下者至等活地獄黑繩地獄衆合地獄號叫地獄大號叫地獄燒然地獄大燒然地獄無間地獄疱形地獄連疱地獄阿吒吒地獄阿呵呵地獄阿呼呼地獄青蓮花地獄紅蓮花地獄大紅蓮花地獄如是等處若受炎熱皆得清涼居處寒氷便獲溫暖彼諸有情各得安樂皆作是語我與汝等為從此死生餘處耶爾時世尊令彼有情生信心故復現餘相彼見相已咸作是語我等不於此死而生餘處然我必由希有大人威神力故令我身心現處安樂既生敬信能滅地獄所有諸苦於人天處受勝妙身當為法器得見真理其光上升者從四大王衆天至三十三天夜摩天覩史多天樂變化天他化自在天梵衆天梵輔天大梵天少光天無量光天極光淨天少淨天無量淨天遍淨天無雲天福生天廣果天無煩天無熱天善現天善見天乃至色究竟天於此光中演説苦空無常無我等法并説二伽他曰汝當求出離於佛教勤修降伏生死軍如象摧草舍於此法律中常為不放逸能竭煩惱海當盡苦邊際時彼光明遍照三千大千世界已還至佛所若佛世尊説過去事光從背入若説未來事光從胸入若説地獄事光從足下入若説傍生事光從足跟入若説餓鬼事光從足指入若説人事光從膝入若説力輪王事光從左手掌入若説轉輪王事光從右手掌入若説天事光從臍入若説聲聞事光從口入若説獨覺事光從眉間入若説阿耨多羅三藐三菩提事光從頂入是時光明繞佛三匝從頂而入時具壽阿難陀合掌恭敬而白佛言世尊如來應正等覺熙怡微笑非無因緣即説伽他而請佛曰口出種種妙光明流滿大千非一相周遍十方諸剎土如日光照盡虛空佛是衆生最勝因能除憍慢及憂戚無緣不啓於金口微笑當必演希奇安詳審諦牟尼尊樂欲聞者能為説如師子王發大吼願為我等決疑心如大海內妙山王若無因緣不搖動自在慈悲現微笑為渴仰者説因緣爾時世尊告阿難陀曰如是如是阿難陀非無因緣如來應正等覺輒現微笑阿難陀此地方所乃是過去迦攝波佛為聲聞衆説法之處時阿難陀聞是語已疾疾取七條衣疊為四重白佛言世尊我已敷座願佛知時可於斯坐冀令此地有二正覺受用之處謂迦攝波佛及今世尊佛告阿難陀曰善哉善哉我雖不説汝自知時爾時世尊即便就座復告阿難陀曰此地方所是迦攝波佛所住之寺此是經行處此是廊宇門屋洗足之處此是淨厨地此是浴室處汝等應知是時塢波離白佛言世尊如佛所説淨不淨地者不知齊何名淨不淨佛言乃至正法住世有淨不淨正法若滅悉皆不淨世尊齊何名正法住世云何名滅佛告塢波離乃至有秉羯磨有如説行者是則名為正法住世若不秉羯磨無如説行是則名為正法滅壞復白佛言若無上大師在於界外苾芻得秉羯磨不佛言不得若大師在於界內餘人得秉羯磨不佛言得又得以世尊足僧數不佛言不得佛寶僧寶體差別故於不可越界得越過不佛言不得大德不知有幾不可越界佛言有其五種謂苾芻界苾芻尼界小壇場現停水處二界中間大德若有深塹及以河澗不可越界頗得越不佛言若常有橋梁越之非咎如其橋梁破壞得齊幾時名不失界佛言得齊七夜此據有心修理無心修理隨破即失若有苾芻正結界時秉羯磨者忽然命過得成結不佛言若知標相所作羯磨已秉多分此雖命過得成結界若未知標相所秉羯磨未過多分此時命終不成結界若苾芻尼結界成不準此應知第五子攝頌曰地牆等秉事結界無與欲但於一處坐得為四羯磨緣在室羅伐城具壽塢波離請世尊曰在地居人共地居者遙秉羯磨得成秉不佛言不成與欲得成大德在地之人與牆頭者共秉羯磨得成秉不佛言不成大德在地之人與樹上者共秉羯磨得成秉不佛言不成大德在地之人與居空者共秉羯磨得成秉不佛言不成應知以樹牆空為頭各有四句亦如是如世尊説有百一羯磨幾合與欲幾不合與欲佛言唯除結界餘並與欲大德若以神變幻術而作標相得為標不佛言不得神力幻術非實有故或以日月星宿為標相者得成標不佛言不得日月星宿非定住故若以水波浪得成標不佛言不得由其波浪疾移轉故若苾芻為他持欲淨乘空而去此得名為持欲淨不佛言不成應更取欲若有苾芻秉一羯磨於四住處並得成不佛言得如其四界各有四人事現前者各於其處別置三人時秉法者或席或床或板或薦壓四界上而秉羯磨以秉法者添彼四數咸成作法如是若於四界有別事起作七羯磨等謂驅擯羯磨令怖羯磨折伏羯磨求謝羯磨不見罪羯磨不如法悔羯磨不捨惡見羯磨若作此等羯磨之時其秉法人在彼四界角相近處若以席板床薦總壓而坐秉法皆成第六子攝頌曰大界兩驛半下水上山巔異見明相過五衆受七日具壽塢波離請世尊曰如世尊説應結大界者齊幾許來是大界量佛言大界者齊兩踰膳那半應可結之言踰膳那者當三十里是此一驛由旬者訛也欲令易了故有言驛之處若過兩踰膳那半亦是界不佛言若過非界向下齊何名為大界佛言齊至水來名為大界兩踰膳那半外方至水者此之剩處得名界不佛言不是向上齊何名為大界佛言上至樹抄或齊牆頭名為界分大德兩踰膳那半外方至抄頭斯之剩處得名界不佛言不是若上山巔齊何名界佛言齊其水處兩驛半外方至其水亦名界不佛言不是世尊若於夏中僧伽破壞時有苾芻故從法黨向非法黨為是破夏為非破耶佛言此之苾芻樂其異見至惡黨處經明相時便即破夏若不樂異見至惡黨處雖過明相不名破夏如世尊説若在夏中有緣須出應受七日去者不知何人應受佛言所謂五衆苾芻苾芻尼正學女求寂求寂女此於何處應受佛言可於界內隨意可向一苾芻前合掌而住作如是語具壽存念我苾芻某甲於此住處或前或後三月夏安居我苾芻某甲為僧伽事故守持七日出界外若無難緣還來此處我於今夏在此安居如是三説或有六日事來乃至一日準七日應受具如餘處第七子攝頌曰五衆坐安居親等請日去於經有疑問求解者應行具壽塢波離請世尊曰如世尊説應夏安居者未知誰合安居佛言五衆合作所謂苾芻苾芻尼正學女求寂求寂女在於屏處對一苾芻當前蹲踞作如是説具壽存念今僧伽五月十六日作夏安居我苾芻某甲亦於五月十六日作夏安居我苾芻某甲於此住處界內前三月夏安居以某甲為施主某甲為營事人某甲為瞻病人於此住處乃至若有圮裂穿壞當修補之我於今夏在此安居第二第三亦如是説或前或後隨意應作應知尼亦對尼準苾芻作其求寂應對苾芻正學女及求寂女對尼應作如世尊説苾芻坐夏之時若有塢波索迦等請喚之事守持七日去者若有外道及親族等請喚亦得去不佛言此亦應去若於三藏有疑須欲咨問亦得去不佛言得去若苾芻未得求得未解求解未證求證及有疑心須往開決為斯等事亦得守持七日去不佛言皆得若受一日二日等準此應作大唐景龍四年歲次庚戌四月壬午朔十五日景申三藏法師大德沙門義淨宣釋梵本并綴文正字翻經沙門吐火羅大德達磨秣磨證梵義翻經沙門中天竺國大德拔努證梵義翻經沙門罽賓國大德達磨難陀證梵文翻經沙門淄州大雲寺大德慧沼證義翻經沙門洛州崇光寺大德律師道琳證義翻經沙門福壽寺主大德利明證義翻經沙門渭州太平寺大德律師道恪證義翻經沙門大薦福寺大德勝莊證義翻經沙門相州禪河寺大德玄傘證義筆受翻經沙門大薦福寺大德智積證義正字翻經沙門德州大雲寺主慧傘證義翻經沙門西涼州白塔寺大德慧積讀梵本翻經婆羅門右驍衛翊府中郎將員外置宿衛臣李釋迦讀梵本翻經婆羅門東天竺國左屯衛翊府中郎將員外置同正員臣翟金剛證義翻經婆羅門東天竺國大首領臣伊金羅證梵本翻經婆羅門左領軍衛中郎將迦濕彌羅國王子臣何順證義翻經婆羅門東天竺國左領軍右執戟直中書省臣頗具讀梵本翻經婆羅門龍播國大達官準五品臣李輸羅證譯金紫光祿大夫守尚書左僕射同中書門下三品上柱國史舒國公臣韋臣源監譯尚書右僕射同中書門下三品上柱國許國公臣蘇環監譯特進行太子少師同中書門下三品上柱國宋國公臣唐休璟監譯特進太子少保兼揚州大都督同中書門下三品監修國史上柱國彭國公臣韋溫監譯特進同中書門下三品修文館大學士監修國史上柱國趙國公臣李嶠筆受兼潤色特進侍中監修國史上柱國公臣韋安石監譯侍中監修國史上柱國越國公臣紀處訥監譯光祿大夫行中書令修文館大學士監國史上柱國郢國公臣宗楚客監譯中書令監修國史上柱國酇國公臣蕭至忠監譯翻經學士銀青光祿大夫守兵部尚書門下三品修文館大學士上柱國逍遙公臣韋嗣立翻經學士中散大夫守中書侍郎同中書門下三品著紫佩金魚修文館學士上柱國臣趙彥昭翻經學士太中大夫守祕書監員外置同正員修國史修文館學士上柱國臣劉憲翻經學士銀青光祿大夫行中書侍郎修文館學士兼修國史上柱國朝陽縣開國子臣岑義翻經學士通議大夫守吏部侍郎修文館學士兼修國史上柱國臣崔湜翻經學士朝議大夫守兵部侍郎兼修文館學士修國史上柱國臣張説翻經學士太中大夫檢校兵部侍郎騎尉修文館學士安平縣開國子臣崔日用翻經學士朝請大夫守中書舍人兼檢校吏部侍郎修文館學士經車都尉臣盧藏用翻經學士銀青光祿大夫行禮部侍郎修文館學士修國史上柱國慈源縣開國子臣徐堅貞翻經學士正議大夫行國子司業修文館學士上柱國臣郭山惲翻經學士禮部郎中修文館直學士輕車都尉河東縣開國男臣薜稷翻經學士正議大夫前蒲州刺史修文館學士上柱國高平縣開國子臣徐彥伯翻經學士中大夫行中書舍人修文館學士上柱國臣李乂翻經學士中書舍人修文館學士上柱國金鄉縣開國男韋元亘翻經學士中大夫行中書舍人修文館學士上柱國臣馬懷素翻經學士朝請大夫守給事中修文館學士上柱國臣李適翻經學士中書舍人修文館學士上柱國臣蘇頲翻經學士朝散大夫守著作郎修文館學士兼修國史臣鄭愔翻經學士朝散大夫行起居郎修文館直學士上護軍臣沈佺期翻經學士朝請大夫行考功員外郎修文館直學士上輕車都尉臣武平翻經學士著作佐郎修文館直學士臣閻朝隱翻經學士修文館直學士臣符鳳書手祕書省楷書令史臣趙希令寫孔目官文林郎少府監掌治署丞臣殷庭龜判官朝散大夫行著作佐郎臣劉令植使金紫光祿大夫行祕書監檢校殿中監兼知內外間廄隴右三使上柱國嗣號臣王雍
